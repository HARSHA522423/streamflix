<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>StreamFlix</title>

    <link rel="stylesheet"
          href="css/style.css">

          <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>


  <nav class="navbar">

    <h1 class="logo">STREAMFLIX</h1>

    <ul class="nav-links">
        <li>Home</li>
        <li>Movies</li>
        <li>TV Shows</li>
        <li>My List</li>
    </ul>

    <div class="nav-icons">

        <!-- Search Icon -->
        <i class="fas fa-search"></i>

        <!-- Profile Icon -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"
             alt="Profile"
             class="profile-icon">

    </div>

</nav>

    <!-- HERO SECTION -->

    <section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1 id="banner-title">Money Heist</h1>

        <p id="banner-desc">
            Spanish crime thriller with intense action.
        </p>

        <button class="play-btn">
            ▶ Play Now
        </button>

    </div>

</section>

    <!-- MOVIES SECTION -->

    <section class="movies-section">

        <h2>Trending Movies</h2>

        <div id="movie-container"></div>

    </section>

    <script src="js/app.js"></script>

</body>
</html>
